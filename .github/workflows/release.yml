name: Release Desktop App

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# sidecar 版本的單一來源是 repo 根目錄的 SHIOAJI_VERSION 檔 —
# app（vite define 版本握手）與這裡的下載步驟都讀同一個檔
jobs:
  # Create the draft release ONCE before the matrix fans out — when the four
  # build jobs raced to create it, GitHub happily made two releases for the
  # same tag and the assets split between them (v0.1.9 shipped without
  # Windows/mac-Intel until manually merged).
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create '${{ github.ref_name }}'             --repo '${{ github.repository }}'             --draft --title 'Shioaji Pro ${{ github.ref_name }}'             --notes-file RELEASE_NOTES.md           || echo "release already exists (re-run)"

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            sidecar: macOS-aarch64.tar.gz
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            sidecar: macOS-x86_64.tar.gz
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar: Linux-x86_64.tar.gz
            args: ''
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar: Windows-x86_64.zip
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # the desktop layer (Tauri shell + AI Agent) is closed-source — pull
      # it in via a read-only deploy key so the desktop build is complete
      - name: Checkout desktop modules (private)
        shell: bash
        env:
          AGENT_SSH_KEY: ${{ secrets.AGENT_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AGENT_SSH_KEY" > ~/.ssh/agent_key
          chmod 600 ~/.ssh/agent_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/agent_key -o IdentitiesOnly=yes" \
            git clone --depth 1 git@github.com:Yvictor/shioaji-pro-desktop.git desktop_modules
          mv desktop_modules/modules modules
          mv desktop_modules/src-tauri src-tauri
          rm -rf desktop_modules ~/.ssh/agent_key

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - name: Resolve sidecar version (unix)
        if: matrix.platform != 'windows-latest'
        run: echo "SHIOAJI_VERSION=$(cat SHIOAJI_VERSION | tr -d '[:space:]')" >> "$GITHUB_ENV"

      - name: Resolve sidecar version (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: echo "SHIOAJI_VERSION=$((Get-Content SHIOAJI_VERSION -Raw).Trim())" >> $env:GITHUB_ENV

      - name: Download shioaji sidecar (unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL -o sidecar.tar.gz \
            "https://github.com/sinotrade/shioaji/releases/download/${SHIOAJI_VERSION}/shioaji-${SHIOAJI_VERSION}-${{ matrix.sidecar }}"
          tar xzf sidecar.tar.gz
          mv shioaji "src-tauri/binaries/shioaji-${{ matrix.target }}"
          chmod +x "src-tauri/binaries/shioaji-${{ matrix.target }}"

      - name: Download shioaji sidecar (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Invoke-WebRequest -Uri "https://github.com/sinotrade/shioaji/releases/download/$env:SHIOAJI_VERSION/shioaji-$env:SHIOAJI_VERSION-${{ matrix.sidecar }}" -OutFile sidecar.zip
          Expand-Archive sidecar.zip -DestinationPath sidecar-extract
          Move-Item sidecar-extract/shioaji.exe "src-tauri/binaries/shioaji-${{ matrix.target }}.exe"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Tauri treats a present-but-empty APPLE_ID as "please notarize", so the
      # notarization env is only injected when real credentials exist.
      - name: Enable notarization (when credentials are configured)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          if [ -n "${{ secrets.APPLE_ID }}" ] && [ -n "${{ secrets.APPLE_PASSWORD }}" ]; then
            {
              echo "APPLE_ID=${{ secrets.APPLE_ID }}"
              echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
              echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
            } >> "$GITHUB_ENV"
            echo "Notarization enabled"
          else
            echo "Notarization credentials not set — signing only"
          fi

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # feature-flag service client key (publishable; baked into bundle)
          STATSIG_CLIENT_KEY: ${{ secrets.STATSIG_CLIENT_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code-signing (notarization env is injected by the step
          # above only when credentials are configured)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Shioaji Pro ${{ github.ref_name }}'
          releaseBody: |
            Shioaji Pro 桌面版 — 內建 shioaji server（sidecar）、伺服器管理介面、
            系統匣（menu bar）、自動更新。下載對應平台的安裝檔即可使用。

            macOS: .dmg ｜ Windows: .msi / .exe ｜ Linux: .AppImage / .deb / .rpm
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # The matrix jobs read-modify-write latest.json concurrently, so
      # entries can race away — rebuild it deterministically from the
      # uploaded .sig assets before the release goes live.
      - name: Rebuild updater latest.json from assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/lj
          gh release download '${{ github.ref_name }}'             --repo '${{ github.repository }}'             --dir /tmp/lj --pattern '*.sig' --pattern 'latest.json'
          python3 scripts/fix-latest-json.py '${{ github.ref_name }}'             /tmp/lj '${{ github.repository }}'
          gh release upload '${{ github.ref_name }}'             --repo '${{ github.repository }}' /tmp/lj/latest.json --clobber
      - name: Publish release (all platforms assembled)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # per-release feature notes live in RELEASE_NOTES.md
          if [ -f RELEASE_NOTES.md ]; then
            gh release edit '${{ github.ref_name }}'               --repo '${{ github.repository }}' --notes-file RELEASE_NOTES.md
          fi
          gh release edit '${{ github.ref_name }}'             --repo '${{ github.repository }}' --draft=false
